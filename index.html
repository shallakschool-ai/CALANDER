<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الروزنامة الإلكترونية | ثانوية الجنان 2025 - 2026</title>
  <style>
    :root{
      --green:#4d7568;
      --green-dark:#35564b;
      --green-soft:#eef4f1;
      --green-soft-2:#f6faf8;
      --bg:#f3f6f5;
      --card:#ffffff;
      --line:#dde5e1;
      --text:#1f2f2a;
      --muted:#6d7b76;
      --shadow:0 12px 30px rgba(22,34,30,.06);
      --shadow-soft:0 6px 16px rgba(22,34,30,.045);
      --school:#c98a56;
      --holiday:#b79a75;
      --global:#9baa6d;
      --islamic:#6e9a86;
      --grades:#8f84b9;
      --review:#7caaba;
      --exam:#c96c74;
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(77,117,104,.05), transparent 28%),
        linear-gradient(180deg,#f8fbfa 0%,#f2f5f4 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .container{
      width:min(1220px,calc(100% - 18px));
      margin:10px auto 24px;
    }

    .hero,.panel,.mini-month,.modal-card{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius:var(--radius-xl);
      backdrop-filter:blur(8px);
    }

    .hero{
      padding:18px;
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:14px;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(77,117,104,.05);
      left:-40px;
      top:-40px;
      pointer-events:none;
    }

    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .pill{
      background:var(--green-soft);
      color:var(--green-dark);
      border:1px solid #d8e4de;
      padding:7px 12px;
      border-radius:999px;
      font-weight:700;
      font-size:.88rem;
      box-shadow:var(--shadow-soft);
    }

    h1{
      margin:0 0 8px;
      color:var(--green-dark);
      font-size:clamp(1.45rem,4vw,2.45rem);
      line-height:1.22;
      letter-spacing:-.2px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.85;
      font-size:.95rem;
      max-width:760px;
    }

    .legend-box{
      padding:14px;
      background:linear-gradient(180deg,#fbfcfc 0%,#f8fbfa 100%);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
    }

    .legend-box h2{
      margin:0 0 10px;
      color:var(--green-dark);
      font-size:1rem;
    }

    .legend{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:.9rem;
      color:var(--text);
    }

    .dot,.marker{border-radius:50%}
    .dot{width:11px;height:11px;flex:0 0 11px}

    .toolbar{
      margin:14px 0;
      display:grid;
      grid-template-columns:1fr 210px auto auto;
      gap:10px;
      align-items:center;
    }

    input,select,textarea,button{font:inherit}

    .field,.select,.textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:13px 14px;
      background:#fff;
      color:var(--text);
      outline:none;
      box-shadow:var(--shadow-soft);
      transition:.18s ease;
    }

    .field:focus,.select:focus,.textarea:focus{
      border-color:#b9cac3;
      box-shadow:0 0 0 4px rgba(77,117,104,.08);
    }

    .switch-wrap,.action-wrap{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .switch-wrap{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:5px;
      box-shadow:var(--shadow-soft);
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:10px 14px;
      font-weight:700;
      transition:.18s ease;
    }

    .switch-btn{background:transparent;color:var(--muted)}
    .switch-btn.active,.btn-primary{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(77,117,104,.16);
    }
    .btn-soft{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      box-shadow:var(--shadow-soft);
    }

    .btn-primary:hover,.btn-soft:hover,.month-chip:hover,.switch-btn:hover{transform:translateY(-1px)}

    .month-nav{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(116px,1fr));
      gap:8px;
      margin-bottom:12px;
    }

    .month-chip{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      box-shadow:var(--shadow-soft);
    }

    .month-chip.active{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
      border-color:transparent;
    }

    .layout{
      display:grid;
      grid-template-columns:1.08fr .62fr;
      gap:14px;
    }

    .panel{padding:16px}
    .panel + .panel{margin-top:12px}

    .month-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .season{
      display:inline-block;
      background:var(--green-soft);
      color:var(--green-dark);
      padding:7px 11px;
      border-radius:999px;
      font-size:.84rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .month-title{
      margin:0;
      font-size:clamp(1.18rem,3vw,1.8rem);
      color:var(--green-dark);
      letter-spacing:-.2px;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
    }

    .weekday,.day{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:8px;
    }

    .weekday{
      background:#f3f7f5;
      text-align:center;
      font-weight:700;
      color:#607069;
      font-size:.85rem;
    }

    .day{
      min-height:90px;
      display:flex;
      flex-direction:column;
      gap:7px;
      transition:.18s ease;
      box-shadow:var(--shadow-soft);
    }

    .day.empty{
      background:#f8faf9;
      border-style:dashed;
      box-shadow:none;
    }

    .day.has-events{cursor:pointer}
    .day.has-events:hover{transform:translateY(-2px)}
    .day.dimmed{opacity:.48}

    .day-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:6px;
    }

    .day-number{
      width:30px;
      height:30px;
      border-radius:50%;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      font-weight:900;
      background:#f3f6f5;
      font-size:.88rem;
    }

    .day-text{
      color:var(--muted);
      font-size:.78rem;
      line-height:1.42;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .count{
      font-size:.7rem;
      color:var(--muted);
      font-weight:700;
    }

    .marker-row{
      margin-top:auto;
      display:flex;
      flex-wrap:wrap;
      gap:5px;
    }

    .marker{width:9px;height:9px}

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .panel-head h3,.panel-head h4{
      margin:0;
      color:var(--green-dark);
      font-size:1rem;
    }

    .muted{
      margin:0;
      color:var(--muted);
      font-size:.86rem;
    }

    .events{
      display:grid;
      gap:9px;
      max-height:700px;
      overflow:auto;
    }

    .event-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:11px;
      display:grid;
      gap:6px;
      box-shadow:var(--shadow-soft);
    }

    .event-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-size:.82rem;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:#f7faf8;
      border:1px solid #edf2ef;
      border-radius:999px;
      padding:6px 9px;
      color:var(--muted);
      font-size:.74rem;
      font-weight:700;
    }

    .event-title{
      margin:0;
      font-weight:800;
      line-height:1.55;
      font-size:.92rem;
    }

    .summary{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }

    .summary-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:11px;
      text-align:center;
      box-shadow:var(--shadow-soft);
    }

    .summary-box strong{
      display:block;
      font-size:1rem;
      margin-bottom:4px;
      color:var(--green-dark);
    }

    .textarea{
      min-height:120px;
      resize:vertical;
      line-height:1.8;
    }

    .year-view{
      display:none;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:12px;
    }

    .year-view.active,.month-view.active{display:block}

    .mini-month{padding:12px}
    .mini-month h3{
      margin:0 0 10px;
      font-size:.98rem;
      color:var(--green-dark);
    }

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:5px;
    }

    .mini-head,.mini-day{
      padding:7px 0;
      text-align:center;
      border-radius:10px;
      font-size:.78rem;
    }

    .mini-head{
      background:#f3f7f5;
      font-weight:700;
      color:var(--muted);
    }

    .mini-day{background:#fff}
    .mini-day.empty{background:#f8faf9}
    .mini-day.eventful{
      background:var(--green-soft);
      color:var(--green-dark);
      font-weight:800;
      cursor:pointer;
    }

    .footer{
      margin-top:12px;
      text-align:center;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.8;
      padding:4px 8px;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(26,34,31,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
      z-index:1000;
    }

    .modal.show{display:flex}
    .modal-card{
      width:min(680px,100%);
      max-height:88vh;
      overflow:auto;
      padding:16px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .modal-head h3{
      margin:0;
      color:var(--green-dark);
      font-size:1.05rem;
    }

    .close-btn{
      width:38px;
      height:38px;
      border-radius:50%;
      background:#f2f5f3;
      color:var(--text);
      padding:0;
      font-size:1.15rem;
      line-height:1;
    }

    .empty-state{
      background:#fff;
      border:1px dashed var(--line);
      border-radius:16px;
      padding:16px;
      text-align:center;
      color:var(--muted);
      font-size:.9rem;
    }

    @media (max-width:1100px){
      .hero,.toolbar,.layout{grid-template-columns:1fr}
    }

    @media (max-width:760px){
      .container{width:min(100%,calc(100% - 10px));margin:6px auto 16px}
      .hero,.panel,.mini-month,.modal-card{padding:12px;border-radius:18px}
      .hero{gap:12px}
      .legend{grid-template-columns:1fr}
      .legend-box{padding:12px}

      .toolbar{
        position:sticky;
        top:8px;
        z-index:20;
        background:rgba(243,246,245,.9);
        backdrop-filter:blur(10px);
        padding:8px;
        border-radius:18px;
        border:1px solid rgba(221,229,225,.9);
        box-shadow:var(--shadow);
      }

      .month-nav{
        display:flex;
        overflow:auto;
        gap:8px;
        padding:2px 2px 6px;
        scroll-snap-type:x proximity;
      }
      .month-nav::-webkit-scrollbar{display:none}
      .month-chip{
        min-width:110px;
        flex:0 0 auto;
        scroll-snap-align:start;
      }

      .calendar-grid{gap:6px}
      .weekday,.day{padding:6px;border-radius:12px}
      .weekday{font-size:.72rem}
      .day{
        min-height:76px;
        border-radius:14px;
      }
      .day-number{
        width:28px;
        height:28px;
        font-size:.78rem;
      }
      .count{display:none}
      .day-text{
        font-size:.7rem;
        -webkit-line-clamp:1;
      }
      .summary{grid-template-columns:1fr 1fr}
      .events{max-height:none}
      .switch-wrap,.action-wrap{width:100%}
      .switch-wrap button,.action-wrap button{flex:1}
      .month-header .action-wrap{width:100%}
      .month-header .action-wrap button{flex:1}
      .event-card,.summary-box{border-radius:14px}
    }

    @media (max-width:480px){
      body{background:#f6f8f7}
      .container{width:min(100%,calc(100% - 8px))}
      .hero{
        padding:12px;
        border-radius:20px;
      }
      .hero h1{
        font-size:1.22rem;
        line-height:1.28;
      }
      .hero p{font-size:.88rem;line-height:1.75}
      .pill{font-size:.8rem;padding:6px 10px}
      .legend-item{font-size:.82rem}

      .panel{
        padding:12px;
        border-radius:18px;
      }

      .month-header{
        margin-bottom:12px;
      }
      .season{font-size:.8rem;padding:6px 10px}
      .month-title{font-size:1.08rem}

      .calendar-grid{
        gap:5px;
      }
      .weekday{
        font-size:.64rem;
        padding:7px 2px;
      }
      .day{
        min-height:70px;
        padding:5px;
      }
      .day-number{
        width:24px;
        height:24px;
        font-size:.72rem;
      }
      .marker{width:8px;height:8px}

      .toolbar{
        gap:8px;
        top:6px;
        padding:7px;
      }
      .field,.select,.textarea{
        border-radius:14px;
        padding:12px 13px;
        font-size:.92rem;
      }
      button{border-radius:12px}
      .summary{grid-template-columns:1fr}
      .mini-head,.mini-day{font-size:.7rem}
      .footer{font-size:.82rem}
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER MOBILE FIRST -->
    <header class="hero" style="display:block">
      <div class="pills">
        <span class="pill">2025 / 2026</span>
        <span class="pill">1447 / 1448</span>
      </div>
      <h1>الروزنامة الإلكترونية</h1>
      <p>ثانوية الجنان</p>
    </header>

    <!-- TOOLBAR MOBILE -->
    <section class="toolbar" style="grid-template-columns:1fr;">
      <input id="searchInput" class="field" type="text" placeholder="ابحث..." />

      <div class="switch-wrap">
        <button class="switch-btn active" data-view="month">📅 شهري</button>
        <button class="switch-btn" data-view="year">🗓️ سنوي</button>
      </div>

      <div class="action-wrap">
        <button id="resetBtn" class="btn-soft">🏠 بداية</button>
        <button id="printBtn" class="btn-primary">🖨️ طباعة</button>
      </div>
    </section>

    <!-- MONTH NAV -->
    <nav class="month-nav" id="monthNav"></nav>

    <!-- MONTH VIEW -->
    <section class="month-view active" id="monthView">

      <div class="panel">
        <div class="month-header">
          <div>
            <div class="season" id="seasonLabel"></div>
            <h2 class="month-title" id="monthTitle"></h2>
          </div>
          <div class="action-wrap">
            <button id="prevMonth" class="btn-soft">◀</button>
            <button id="nextMonth" class="btn-soft">▶</button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <!-- EVENTS LIST UNDER CALENDAR (LIKE APPS) -->
      <div class="panel">
        <div class="panel-head">
          <h3>الأحداث</h3>
          <p class="muted" id="eventsCount">0</p>
        </div>
        <div class="events" id="eventList"></div>
      </div>

    </section>

    <!-- YEAR VIEW -->
    <section class="year-view" id="yearView"></section>

  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">تفاصيل اليوم</h3>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

</body>
</html>
