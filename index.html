<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الروزنامة الإلكترونية | ثانوية الجنان 2025 - 2026</title>
  <meta name="description" content="روزنامة إلكترونية تفاعلية لثانوية الجنان للعام الدراسي 2025 - 2026" />
  <style>
    :root {
      --green: #0f8c63;
      --green-2: #0b6f4f;
      --green-3: #0b5c42;
      --gold: #c68a42;
      --gold-soft: #e8c49a;
      --paper: #f6f1eb;
      --paper-2: #fbf8f4;
      --card: rgba(255,255,255,.9);
      --line: #e8ddd1;
      --text: #173a33;
      --muted: #6d7a76;
      --shadow: 0 14px 35px rgba(16, 45, 38, 0.09);
      --shadow-soft: 0 8px 22px rgba(16, 45, 38, 0.06);

      --school: #eb7a2f;
      --holiday: #c68a42;
      --global: #b9b037;
      --islamic: #14a06d;
      --grades: #8e6ac5;
      --review: #2eadd6;
      --exam: #d74b55;

      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --trans: 180ms ease;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 100% 0%, rgba(15,140,99,.08), transparent 22%),
        radial-gradient(circle at 0% 100%, rgba(198,138,66,.09), transparent 24%),
        linear-gradient(180deg, #f7f2ec 0%, #f2ebe3 100%);
    }

    body.modal-open { overflow: hidden; }

    .container {
      width: min(1450px, calc(100% - 28px));
      margin: 18px auto 32px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 26px;
      background:
        linear-gradient(135deg, rgba(15,140,99,.98), rgba(11,111,79,.96));
      color: #fffdf7;
      box-shadow: var(--shadow);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      pointer-events: none;
    }

    .hero::before {
      width: 260px;
      height: 260px;
      top: -90px;
      right: -55px;
    }

    .hero::after {
      width: 210px;
      height: 210px;
      left: -40px;
      bottom: -95px;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo-badge {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: rgba(255,255,255,.14);
      border: 2px solid rgba(255,255,255,.22);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.05);
    }

    .year-stack {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .year-pill {
      min-width: 88px;
      padding: 10px 14px;
      border-radius: 999px;
      text-align: center;
      font-weight: 800;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff8eb;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.18;
      letter-spacing: -.3px;
    }

    .subtitle {
      margin: 0;
      max-width: 900px;
      color: rgba(255,251,241,.9);
      line-height: 1.8;
      font-size: 1rem;
    }

    .hero-right {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      padding: 18px;
      backdrop-filter: blur(8px);
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .hero-right h2,
    .panel-title {
      margin: 0;
      font-size: 1.06rem;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px 14px;
    }

    .legend-item,
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: .95rem;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex: 0 0 13px;
      box-shadow: 0 0 0 3px rgba(255,255,255,.09);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.18rem;
      margin-bottom: 4px;
    }

    .toolbar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.1fr .5fr auto auto;
      gap: 12px;
      align-items: center;
    }

    .search,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      outline: none;
      transition: var(--trans);
      box-shadow: var(--shadow-soft);
    }

    .search:focus,
    .select:focus,
    .textarea:focus {
      border-color: rgba(15,140,99,.42);
      box-shadow: 0 0 0 4px rgba(15,140,99,.08);
    }

    .view-switch,
    .utility-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .switch-shell {
      display: inline-flex;
      gap: 6px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 6px;
      box-shadow: var(--shadow-soft);
    }

    button {
      border: none;
      cursor: pointer;
      font: inherit;
    }

    .btn,
    .switch-btn,
    .month-chip {
      transition: var(--trans);
    }

    .btn,
    .switch-btn {
      padding: 11px 16px;
      border-radius: 14px;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--green-2));
      color: white;
      box-shadow: 0 12px 22px rgba(15,140,99,.18);
    }

    .btn-primary:hover { transform: translateY(-1px); }
