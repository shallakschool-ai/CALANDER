<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الروزنامة الإلكترونية | ثانوية الجنان 2025 - 2026</title>
  <style>
    :root {
      --green: #0f8c63;
      --green-dark: #0b6f4f;
      --gold: #c68a42;
      --bg: #f6f1eb;
      --card: #ffffff;
      --line: #e6ddd3;
      --text: #173a33;
      --muted: #6c7975;
      --shadow: 0 12px 30px rgba(16,45,38,.08);
      --school: #eb7a2f;
      --holiday: #c68a42;
      --global: #b7ae36;
      --islamic: #15a16e;
      --grades: #8e6ac5;
      --review: #2daed7;
      --exam: #d74954;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8f3ee 0%, #f2ebe3 100%);
      color: var(--text);
    }

    .container {
      width: min(1400px, calc(100% - 24px));
      margin: 18px auto 30px;
    }

    .hero {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,.92);
      line-height: 1.8;
    }

    .pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
    }

    .legend-box {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 16px;
    }

    .legend-box h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .95rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 12px;
    }

    .toolbar {
      margin: 18px 0;
      display: grid;
      grid-template-columns: 1fr 240px auto auto;
      gap: 12px;
      align-items: center;
    }

    input, select, textarea, button {
      font: inherit;
    }

    .field, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--text);
      outline: none;
    }

    .switch-wrap, .action-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .switch-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 6px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 13px;
      padding: 11px 15px;
      font-weight: 700;
    }

    .switch-btn {
      background: transparent;
      color: var(--text);
    }

    .switch-btn.active {
      background: var(--green);
      color: #fff;
    }

    .btn-primary {
      background: var(--green);
      color: white;
    }

    .btn-soft {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .month-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .month-chip {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .month-chip.active {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      border-color: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr .55fr;
      gap: 18px;
    }
