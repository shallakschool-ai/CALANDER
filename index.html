<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الروزنامة الإلكترونية | ثانوية الجنان 2025 - 2026</title>
  <style>
    :root {
      --green: #4f7d6b;
      --green-dark: #3f6557;
      --green-soft: #edf3f0;
      --green-tint: #f6faf8;
      --white: #ffffff;
      --bg: #f5f7f6;
      --card: #ffffff;
      --line: #dde4e1;
      --text: #24332e;
      --muted: #6c7a75;
      --shadow: 0 10px 26px rgba(25, 39, 34, .06);
      --school: #c78652;
      --holiday: #b79973;
      --global: #9aa56b;
      --islamic: #6b9a84;
      --grades: #8f82b8;
      --review: #7da9b9;
      --exam: #c46d74;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f7f9f8 0%, #f2f5f3 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container {
      width: min(1280px, calc(100% - 20px));
      margin: 10px auto 24px;
    }

    .hero {
      background: linear-gradient(135deg, var(--white), #f8fbfa);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.15fr .95fr;
      gap: 14px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.45rem, 4.8vw, 2.4rem);
      line-height: 1.25;
      color: var(--green-dark);
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: .97rem;
    }

    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .pill {
      background: var(--green-soft);
      color: var(--green-dark);
      border: 1px solid #dbe7e2;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: .92rem;
    }

    .legend-box {
      background: #fbfcfc;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .legend-box h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--green-dark);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .9rem;
      color: var(--text);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex: 0 0 11px;
    }

    .toolbar {
      margin: 14px 0;
      display: grid;
      grid-template-columns: 1fr 220px auto auto;
      gap: 10px;
      align-items: center;
    }

    input, select, textarea, button { font: inherit; }

    .field, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 13px 14px;
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
    }

    .field:focus, .select:focus, .textarea:focus {
      border-color: #b7c9c1;
      box-shadow: 0 0 0 3px rgba(79,125,107,.08);
    }

    .switch-wrap, .action-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .switch-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 5px;
      box-shadow: var(--shadow);
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      transition: .18s ease;
    }

    .switch-btn {
      background: transparent;
      color: var(--muted);
    }

    .switch-btn.active {
      background: var(--green);
      color: #fff;
    }

    .btn-primary {
      background: var(--green);
      color: white;
    }

    .btn-soft {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-primary:hover, .btn-soft:hover, .month-chip:hover, .switch-btn:hover {
      transform: translateY(-1px);
    }

    .month-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .month-chip {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: .93rem;
    }

    .month-chip.active {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      border-color: transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr .62fr;
      gap: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .panel + .panel { margin-top: 12px; }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .season {
      display: inline-block;
      background: var(--green-soft);
      color: var(--green-dark);
      padding: 7px 11px;
      border-radius: 999px;
      font-size: .86rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .month-title {
      margin: 0;
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      color: var(--green-dark);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekday, .day {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
    }

    .weekday {
      background: #f3f6f4;
      text-align: center;
      font-weight: 700;
      color: #607069;
      font-size: .88rem;
    }

    .day {
      min-height: 88px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: .18s ease;
    }

    .day.empty {
      background: #f8faf9;
      border-style: dashed;
    }

    .day.has-events { cursor: pointer; }
    .day.has-events:hover { transform: translateY(-2px); }
    .day.dimmed { opacity: .48; }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
    }

    .day-number {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-weight: 900;
      background: #f2f5f3;
      font-size: .9rem;
    }

    .day-text {
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .count {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 700;
    }

    .marker-row {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .marker {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .panel-head h3, .panel-head h4 {
      margin: 0;
      color: var(--green-dark);
      font-size: 1rem;
    }

    .muted {
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .events {
      display: grid;
      gap: 9px;
      max-height: 700px;
      overflow: auto;
    }

    .event-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 11px;
      display: grid;
      gap: 6px;
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: .85rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f7faf8;
      border: 1px solid #edf2ef;
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 700;
    }

    .event-title {
      margin: 0;
      font-weight: 800;
      line-height: 1.55;
      font-size: .93rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .summary-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px;
      text-align: center;
    }

    .summary-box strong {
      display: block;
      font-size: 1.02rem;
      margin-bottom: 4px;
      color: var(--green-dark);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.8;
    }

    .year-view {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .year-view.active, .month-view.active { display: block; }

    .mini-month {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .mini-month h3 {
      margin: 0 0 10px;
      font-size: .98rem;
      color: var(--green-dark);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .mini-head, .mini-day {
      padding: 7px 0;
      text-align: center;
      border-radius: 9px;
      font-size: .78rem;
    }

    .mini-head {
      background: #f3f6f4;
      font-weight: 700;
      color: var(--muted);
    }

    .mini-day { background: #fff; }
    .mini-day.empty { background: #f8faf9; }
    .mini-day.eventful {
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 800;
      cursor: pointer;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.8;
      padding: 4px 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(26, 34, 31, .35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 1000;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(680px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,.14);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-head h3 { margin: 0; color: var(--green-dark); font-size: 1.05rem; }

    .close-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #f2f5f3;
      color: var(--text);
      padding: 0;
      font-size: 1.15rem;
      line-height: 1;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: var(--muted);
      font-size: .92rem;
    }

    @media (max-width: 1100px) {
      .hero, .toolbar, .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .container { width: min(100%, calc(100% - 12px)); margin: 8px auto 18px; }
      .hero, .panel, .mini-month, .modal-card { padding: 12px; border-radius: 18px; }
      .legend { grid-template-columns: 1fr; }
      .month-nav { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .calendar-grid { gap: 6px; }
      .weekday, .day { padding: 6px; border-radius: 12px; }
      .weekday { font-size: .74rem; }
      .day { min-height: 68px; }
      .day-number { width: 26px; height: 26px; font-size: .78rem; }
      .count { display: none; }
      .day-text { font-size: .7rem; -webkit-line-clamp: 1; }
      .summary { grid-template-columns: 1fr 1fr; }
      .events { max-height: none; }
      .toolbar { gap: 8px; }
      .switch-wrap, .action-wrap { width: 100%; }
      .switch-wrap button, .action-wrap button { flex: 1; }
      .month-header { align-items: stretch; }
      .month-header .action-wrap { width: 100%; }
      .month-header .action-wrap button { flex: 1; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 1.3rem; }
      .hero p { font-size: .9rem; }
      .pill { font-size: .82rem; padding: 7px 10px; }
      .legend-item { font-size: .84rem; }
      .month-nav { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .summary { grid-template-columns: 1fr; }
      .mini-grid { gap: 4px; }
      .mini-head, .mini-day { font-size: .72rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <div class="pills">
          <span class="pill">2025 / 2026</span>
          <span class="pill">1447 / 1448</span>
        </div>
        <h1>الروزنامة الإلكترونية لثانوية الجنان</h1>
        <p>نسخة تفاعلية جاهزة للنشر على GitHub Pages، مع عرض شهري وعرض سنوي وبحث داخل الأحداث ونافذة تفاصيل لكل يوم.</p>
      </div>
      <div class="legend-box">
        <h2>دليل الألوان</h2>
        <div class="legend" id="legend"></div>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="field" type="text" placeholder="ابحث عن حدث أو مناسبة..." />
      <select id="categoryFilter" class="select">
        <option value="all">كل التصنيفات</option>
      </select>
      <div class="switch-wrap">
        <button class="switch-btn active" data-view="month">عرض شهري</button>
        <button class="switch-btn" data-view="year">عرض سنوي</button>
      </div>
      <div class="action-wrap">
        <button id="printBtn" class="btn-primary">طباعة</button>
        <button id="resetBtn" class="btn-soft">أول شهر</button>
      </div>
    </section>

    <nav class="month-nav" id="monthNav"></nav>

    <section class="month-view active" id="monthView">
      <div class="layout">
        <div class="panel">
          <div class="month-header">
            <div>
              <div class="season" id="seasonLabel"></div>
              <h2 class="month-title" id="monthTitle"></h2>
            </div>
            <div class="action-wrap">
              <button id="prevMonth" class="btn-soft">الشهر السابق</button>
              <button id="nextMonth" class="btn-soft">الشهر التالي</button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div>
          <div class="panel">
            <div class="panel-head">
              <h3>أحداث الشهر</h3>
              <p class="muted" id="eventsCount">0 حدث</p>
            </div>
            <div class="events" id="eventList"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h4>ملخص سريع</h4>
            </div>
            <div class="summary" id="summaryGrid"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h4>ملاحظات</h4>
            </div>
            <textarea id="notesArea" class="textarea" placeholder="اكتب ملاحظاتك هنا..."></textarea>
            <div class="action-wrap" style="margin-top:12px;">
              <button id="saveNotes" class="btn-primary">حفظ</button>
              <button id="clearNotes" class="btn-soft">مسح</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="year-view" id="yearView"></section>

    <div class="footer">احفظ الملف باسم <strong>index.html</strong> وارفعه مباشرة إلى GitHub Pages.</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">تفاصيل اليوم</h3>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const categoryMeta = {
      school:  { label: 'مواعيد تربوية', color: 'var(--school)' },
      holiday: { label: 'أعطال', color: 'var(--holiday)' },

    const weekDays = ['الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت','الأحد'];

      { key:'2025-12', title:'كانون الأول 2025', season:'الخريف', days:31, startOffset:0, events:[

        { day:15, title:'مراجعة للاختبارات', category:'review' },
        { day:16, title:'امتحانات فصلية', category:'exam' },
        { day:17, title:'امتحانات فصلية', category:'exam' },
        { day:22, title:'بدء عطلة الأعياد', category:'holiday' },
        { day:25, title:'عيد الميلاد لدى الطوائف الغربية', category:'holiday' },
        { day:29, title:'استمرار عطلة الميلاد', category:'holiday' },
        { day:30, title:'استمرار عطلة الميلاد', category:'holiday' },
        { day:31, title:'استمرار عطلة الميلاد', category:'holiday' }
      ]},
      { key:'2026-01', title:'كانون الثاني 2026', season:'بداية فصل الشتاء', days:31, startOffset:3, events:[
        { day:1, title:'رأس السنة الميلادية', category:'holiday' },
        { day:6, title:'عيد الميلاد عند الطوائف الأرمنية الأرثوذكسية', category:'holiday' },
        { day:17, title:'عطلة إدارية', category:'holiday' },
        { day:24, title:'اليوم العالمي للتعليم', category:'global' },
        { day:26, title:'اليوم العالمي للطاقة النظيفة', category:'global' },
        { day:28, title:'نهاية السعي الثاني (متوسط - ثانوي)', category:'school' }
      ]},
      { key:'2026-02', title:'شباط 2026', season:'الشتاء', days:28, startOffset:6, events:[
        { day:1, title:'مناسبة مدرسية', category:'global' },
        { day:2, title:'امتحانات فصلية', category:'exam' },
        { day:4, title:'امتحانات فصلية', category:'exam' },
        { day:5, title:'تصدير علامات', category:'grades' },

      { key:'2026-06', title:'حزيران 2026', season:'بداية فصل الصيف', days:30, startOffset:0, events:[
        { day:1, title:'مناسبة عالمية', category:'global' },
        { day:7, title:'مناسبة مدرسية', category:'school' },
        { day:13, title:'فعالية الصفوف العليا', category:'holiday' },
        { day:17, title:'حفل التخرج', category:'school' }
      ]}
    ];

    const state = { activeMonthIndex: 0, view: 'month' };
    const notesKey = 'jinan_calendar_notes_v2';

    const legend = document.getElementById('legend');
    const categoryFilter = document.getElementById('categoryFilter');
    const monthNav = document.getElementById('monthNav');
    const monthView = document.getElementById('monthView');
    const yearView = document.getElementById('yearView');
    const monthTitle = document.getElementById('monthTitle');
    const seasonLabel = document.getElementById('seasonLabel');
    const calendarGrid = document.getElementById('calendarGrid');
    const eventList = document.getElementById('eventList');
    const eventsCount = document.getElementById('eventsCount');
    const summaryGrid = document.getElementById('summaryGrid');
    const searchInput = document.getElementById('searchInput');
    const notesArea = document.getElementById('notesArea');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');

    function buildLegendAndFilter() {
      Object.keys(categoryMeta).forEach(function(key) {
        const meta = categoryMeta[key];
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<span class="dot" style="background:' + meta.color + '"></span>' + meta.label;
        legend.appendChild(item);

        const option = document.createElement('option');
        option.value = key;
        option.textContent = meta.label;
        categoryFilter.appendChild(option);
      });
    }

    function matchesFilters(event) {
      const q = searchInput.value.trim().toLowerCase();
      const cat = categoryFilter.value;
      const text = (event.title + ' ' + categoryMeta[event.category].label).toLowerCase();
      const queryOk = !q || text.indexOf(q) !== -1;
      const catOk = cat === 'all' || event.category === cat;
      return queryOk && catOk;
    }

    function buildMonthNav() {
      monthNav.innerHTML = '';
      months.forEach(function(month, index) {
        const btn = document.createElement('button');
        btn.className = 'month-chip' + (index === state.activeMonthIndex ? ' active' : '');
        btn.textContent = month.title;
        btn.addEventListener('click', function() {
          state.activeMonthIndex = index;
          state.view = 'month';
          render();
        });
        monthNav.appendChild(btn);
      });
    }

    function renderCalendar(month) {
      calendarGrid.innerHTML = '';
      monthTitle.textContent = month.title;
      seasonLabel.textContent = month.season;

      weekDays.forEach(function(name) {
        const head = document.createElement('div');
        head.className = 'weekday';
        head.textContent = name;
        calendarGrid.appendChild(head);
      });

      for (let i = 0; i < month.startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day empty';
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= month.days; day++) {
        const original = month.events.filter(function(e) { return e.day === day; });
        const filtered = original.filter(matchesFilters);
        const cell = document.createElement('div');
        cell.className = 'day' + (original.length ? ' has-events' : '') + (original.length && !filtered.length ? ' dimmed' : '');

        const top = document.createElement('div');
        top.className = 'day-top';

        const number = document.createElement('div');
        number.className = 'day-number';
        number.textContent = day;
        if (filtered.length) {
          number.style.background = categoryMeta[filtered[0].category].color;
          number.style.color = '#fff';
        }

        const count = document.createElement('div');
        count.className = 'count';
        count.textContent = filtered.length ? (filtered.length + ' حدث') : (original.length ? 'مخفي' : '');

        top.appendChild(number);
        top.appendChild(count);
        cell.appendChild(top);

        if (filtered.length) {
          const text = document.createElement('div');
          text.className = 'day-text';
          text.textContent = filtered.map(function(e) { return e.title; }).join(' • ');
          cell.appendChild(text);

          const markers = document.createElement('div');
          markers.className = 'marker-row';
          Array.from(new Set(filtered.map(function(e) { return e.category; }))).forEach(function(cat) {
            const marker = document.createElement('span');
            marker.className = 'marker';
            marker.style.background = categoryMeta[cat].color;
            markers.appendChild(marker);
          });
          cell.appendChild(markers);
        }

        if (original.length) {
          cell.addEventListener('click', function() {
            openModal(month.title, day, filtered.length ? filtered : original, !filtered.length);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    function renderEvents(month) {
      const items = month.events.filter(matchesFilters).sort(function(a, b) { return a.day - b.day; });
      eventList.innerHTML = '';
      eventsCount.textContent = items.length + ' حدث';

      if (!items.length) {
        eventList.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة في هذا الشهر.</div>';
        return;
      }

      items.forEach(function(event) {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = '<div class="event-top"><span class="tag"><span class="dot" style="background:' + meta.color + '"></span>' + meta.label + '</span><span>' + event.day + ' ' + month.title.split(' ')[0] + '</span></div><p class="event-title">' + event.title + '</p>';
        card.addEventListener('click', function() {
          const sameDay = month.events.filter(function(e) { return e.day === event.day && matchesFilters(e); });
          openModal(month.title, event.day, sameDay, false);
        });
        eventList.appendChild(card);
      });
    }

    function renderSummary(month) {
      const counts = { school:0, holiday:0, global:0, islamic:0, grades:0, review:0, exam:0 };
      month.events.filter(matchesFilters).forEach(function(e) { counts[e.category]++; });
      summaryGrid.innerHTML = '';
      Object.keys(categoryMeta).forEach(function(key) {
        const box = document.createElement('div');
        box.className = 'summary-box';
        box.innerHTML = '<strong>' + counts[key] + '</strong><span>' + categoryMeta[key].label + '</span>';
        summaryGrid.appendChild(box);
      });
    }

    function renderYear() {
      yearView.innerHTML = '';
      months.forEach(function(month, index) {
        const card = document.createElement('div');
        card.className = 'mini-month';
        card.innerHTML = '<h3>' + month.title + '</h3>';
        const grid = document.createElement('div');
        grid.className = 'mini-grid';

        weekDays.forEach(function(day) {
          const head = document.createElement('div');
          head.className = 'mini-head';
          head.textContent = day.slice(0,2);
          grid.appendChild(head);
        });

        for (let i = 0; i < month.startOffset; i++) {
          const empty = document.createElement('div');
          empty.className = 'mini-day empty';
          grid.appendChild(empty);
        }

        for (let d = 1; d <= month.days; d++) {
          const visible = month.events.some(function(e) { return e.day === d && matchesFilters(e); });
          const el = document.createElement('div');
          el.className = 'mini-day' + (visible ? ' eventful' : '');
          el.textContent = d;
          if (visible) {
            el.addEventListener('click', function() {
              state.activeMonthIndex = index;
              state.view = 'month';
              render();
            });
          }
          grid.appendChild(el);
        }

        card.appendChild(grid);
        yearView.appendChild(card);
      });
    }

    function openModal(monthTitleText, day, events, filteredOut) {
      modalTitle.textContent = day + ' ' + monthTitleText;
      modalContent.innerHTML = '';
      if (filteredOut) {
        const note = document.createElement('div');
        note.className = 'empty-state';
        note.textContent = 'هذا اليوم فيه أحداث لكنها غير ظاهرة بسبب الفلترة الحالية.';
        modalContent.appendChild(note);
      }
      events.forEach(function(event) {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = '<div class="event-top"><span class="tag"><span class="dot" style="background:' + meta.color + '"></span>' + meta.label + '</span><span>' + day + '</span></div><p class="event-title">' + event.title + '</p>';
        modalContent.appendChild(card);
      });
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function updateView() {
      document.querySelectorAll('.switch-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.view === state.view);
      });
      monthView.classList.toggle('active', state.view === 'month');
      yearView.classList.toggle('active', state.view === 'year');
    }

    function render() {
      buildMonthNav();
      const month = months[state.activeMonthIndex];
      renderCalendar(month);
      renderEvents(month);
      renderSummary(month);
      renderYear();
      updateView();
    }

    document.querySelectorAll('.switch-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.view = btn.dataset.view;
        updateView();
      });
    });

    document.getElementById('prevMonth').addEventListener('click', function() {
      state.activeMonthIndex = (state.activeMonthIndex - 1 + months.length) % months.length;
      render();
    });

    document.getElementById('nextMonth').addEventListener('click', function() {
      state.activeMonthIndex = (state.activeMonthIndex + 1) % months.length;
      render();
    });

    document.getElementById('printBtn').addEventListener('click', function() { window.print(); });
    document.getElementById('resetBtn').addEventListener('click', function() {
      state.activeMonthIndex = 0;
      state.view = 'month';
      render();
    });

    searchInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);

    document.getElementById('saveNotes').addEventListener('click', function() {
      localStorage.setItem(notesKey, notesArea.value);
      alert('تم حفظ الملاحظات.');
    });

    document.getElementById('clearNotes').addEventListener('click', function() {
      notesArea.value = '';
      localStorage.removeItem(notesKey);
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    notesArea.value = localStorage.getItem(notesKey) || '';
    buildLegendAndFilter();
    render();
  </script>
