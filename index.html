<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رزنامة الجنان</title>
  <style>
    :root{
      --green:#537a6c;
      --green-dark:#3f6156;
      --green-soft:#edf4f1;
      --green-soft-2:#f7fbf9;
      --bg:#eef3f1;
      --card:rgba(255,255,255,.78);
      --card-strong:#ffffff;
      --line:rgba(207,218,213,.78);
      --text:#1f2c28;
      --muted:#6f7c77;
      --shadow:0 18px 38px rgba(18,29,25,.08);
      --shadow-soft:0 8px 22px rgba(18,29,25,.05);
      --school:#c98a56;
      --holiday:#b79a75;
      --global:#9baa6d;
      --islamic:#6e9a86;
      --grades:#8f84b9;
      --review:#7caaba;
      --exam:#c96c74;
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Tahoma,Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(83,122,108,.08), transparent 30%),
        linear-gradient(180deg,#f8fbfa 0%,#eff3f2 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .container{
      width:min(440px,calc(100% - 12px));
      margin:8px auto 20px;
      padding-bottom:90px;
    }

    .glass{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .hero,.panel,.mini-month,.modal-card,.toolbar,.bottom-nav-wrap{border-radius:28px}

    .hero{
      padding:18px 16px 16px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.76)),
        linear-gradient(135deg, rgba(83,122,108,.08), rgba(255,255,255,0));
      animation:fadeIn .45s ease;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:130px;
      height:130px;
      left:-28px;
      top:-28px;
      border-radius:50%;
      background:rgba(83,122,108,.07);
      filter:blur(8px);
      pointer-events:none;
    }

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInMonth{from{opacity:.68;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    @keyframes tapPop{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}

    .month-animate{animation:slideInMonth .28s ease}
    .tap-pop{animation:tapPop .22s ease}

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .app-icon{
      width:50px;
      height:50px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--green-soft),#fff);
      border:1px solid rgba(209,219,214,.9);
      box-shadow:var(--shadow-soft);
      font-size:1.1rem;
      flex:0 0 50px;
    }

    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .pill{
      background:rgba(83,122,108,.1);
      color:var(--green-dark);
      border:1px solid rgba(83,122,108,.12);
      padding:7px 11px;
      border-radius:999px;
      font-weight:700;
      font-size:.8rem;
      box-shadow:var(--shadow-soft);
    }

    h1{
      margin:0;
      font-size:1.48rem;
      line-height:1.15;
      letter-spacing:-.03em;
      color:var(--green-dark);
      font-weight:800;
    }

    .hero p{
      margin:5px 0 0;
      color:var(--muted);
      line-height:1.6;
      font-size:.92rem;
      font-weight:600;
    }

    .legend-box{
      margin-top:12px;
      padding:14px;
      border-radius:22px;
      background:linear-gradient(180deg,#fbfcfc 0%,#f8fbfa 100%);
      border:1px solid var(--line);
      position:relative;
      z-index:1;
    }

    .legend-box h2{
      margin:0 0 10px;
      color:var(--green-dark);
      font-size:1rem;
      font-weight:800;
    }

    .legend{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .legend-item{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text)}
    .dot,.marker{border-radius:50%}
    .dot{width:11px;height:11px;flex:0 0 11px}

    .toolbar{
      margin:10px 0 12px;
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      padding:10px;
      position:sticky;
      top:8px;
      z-index:35;
      background:rgba(247,250,248,.86);
    }

    input,select,textarea,button{font:inherit}
    .field,.select,.textarea{
      width:100%;
      border:1px solid rgba(213,222,218,.92);
      border-radius:18px;
      padding:13px 14px;
      background:rgba(255,255,255,.94);
      color:var(--text);
      outline:none;
      box-shadow:var(--shadow-soft);
      transition:.18s ease;
    }

    .field:focus,.select:focus,.textarea:focus{
      border-color:rgba(83,122,108,.32);
      box-shadow:0 0 0 4px rgba(83,122,108,.08);
    }

    .switch-wrap,.action-wrap{display:flex;gap:8px;flex-wrap:wrap}

    .switch-wrap{
      background:rgba(255,255,255,.74);
      border:1px solid rgba(213,222,218,.92);
      border-radius:18px;
      padding:5px;
      box-shadow:var(--shadow-soft);
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:10px 14px;
      font-weight:700;
      transition:.18s ease;
    }

    .switch-btn,.nav-btn{background:transparent;color:var(--muted);flex:1}
    .switch-btn.active,.btn-primary,.nav-btn.active{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
      box-shadow:0 10px 18px rgba(83,122,108,.18);
    }

    .btn-soft{
      background:rgba(255,255,255,.92);
      border:1px solid rgba(213,222,218,.92);
      color:var(--text);
      box-shadow:var(--shadow-soft);
      flex:1;
    }

    .month-nav{
      display:flex;
      overflow:auto;
      gap:8px;
      margin-bottom:12px;
      padding:0 2px 4px;
      scroll-snap-type:x proximity;
    }
    .month-nav::-webkit-scrollbar{display:none}

    .month-chip{
      min-width:108px;
      flex:0 0 auto;
      scroll-snap-align:start;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(213,222,218,.92);
      color:var(--text);
      box-shadow:var(--shadow-soft);
      border-radius:18px;
      padding:10px 12px;
      font-size:.86rem;
    }

    .month-chip.active{
      background:linear-gradient(135deg,var(--green),var(--green-dark));
      color:#fff;
      border-color:transparent;
    }

    .panel{
      padding:14px;
      margin-bottom:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.82));
    }

    .calendar-panel{touch-action:pan-y}
    .swipe-hint{
      margin:0 0 10px;
      font-size:.75rem;
      color:var(--muted);
      text-align:center;
      background:var(--green-soft-2);
      border:1px solid rgba(213,222,218,.85);
      border-radius:12px;
      padding:7px 10px;
    }

    .month-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .season{
      display:inline-block;
      background:rgba(83,122,108,.1);
      color:var(--green-dark);
      padding:6px 10px;
      border-radius:999px;
      font-size:.76rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .month-title{
      margin:0;
      font-size:1.12rem;
      color:var(--green-dark);
      letter-spacing:-.02em;
      font-weight:800;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }

    .weekday,.day{
      border:1px solid rgba(218,226,222,.9);
      border-radius:16px;
      background:rgba(255,255,255,.94);
      padding:6px;
    }

    .weekday{
      background:rgba(243,247,245,.95);
      text-align:center;
      font-weight:700;
      color:#64756e;
      font-size:.64rem;
      padding:8px 2px;
    }

    .day{
      min-height:72px;
      display:flex;
      flex-direction:column;
      gap:6px;
      transition:.18s ease;
      box-shadow:var(--shadow-soft);
    }

    .day.empty{
      background:rgba(248,251,249,.78);
      border-style:dashed;
      box-shadow:none;
    }
    .day.has-events{cursor:pointer}
    .day.has-events:hover{transform:translateY(-1px)}
    .day.dimmed{opacity:.48}

    .day-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
    .day-number{
      width:25px;height:25px;border-radius:50%;display:inline-flex;justify-content:center;align-items:center;
      font-weight:800;background:#f2f5f4;font-size:.72rem;
    }

    .day-text{
      color:var(--muted);
      font-size:.68rem;
      line-height:1.32;
      display:-webkit-box;
      -webkit-line-clamp:1;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .count{display:none}
    .marker-row{margin-top:auto;display:flex;flex-wrap:wrap;gap:4px}
    .marker{width:7px;height:7px}

    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .panel-head h3,.panel-head h4{margin:0;color:var(--green-dark);font-size:.98rem;font-weight:800}
    .muted{margin:0;color:var(--muted);font-size:.82rem;font-weight:600}

    .events{display:grid;gap:8px}
    .event-card{
      border:1px solid rgba(218,226,222,.9);
      border-radius:18px;
      background:rgba(255,255,255,.96);
      padding:12px;
      display:grid;
      gap:7px;
      box-shadow:var(--shadow-soft);
      transition:.2s ease;
    }
    .event-card:active{transform:scale(.985)}
    .event-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;font-size:.8rem}
    .tag{
      display:inline-flex;align-items:center;gap:7px;background:#f7faf8;border:1px solid #edf2ef;
      border-radius:999px;padding:6px 9px;color:var(--muted);font-size:.7rem;font-weight:700;
    }
    .event-title{margin:0;font-weight:800;line-height:1.5;font-size:.92rem;letter-spacing:-.01em}

    .summary{display:grid;grid-template-columns:1fr;gap:8px}
    .summary-box{
      background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px;text-align:center;box-shadow:var(--shadow-soft);
    }
    .summary-box strong{display:block;font-size:1rem;margin-bottom:4px;color:var(--green-dark)}

    .textarea{min-height:120px;resize:vertical;line-height:1.8}

    .year-view{display:none;grid-template-columns:1fr;gap:10px}
    .year-view.active,.month-view.active{display:block}

    .mini-month{padding:12px}
    .mini-month h3{margin:0 0 10px;font-size:.96rem;color:var(--green-dark);font-weight:800}
    .mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
    .mini-head,.mini-day{padding:7px 0;text-align:center;border-radius:10px;font-size:.72rem}
    .mini-head{background:#f3f7f5;font-weight:700;color:var(--muted)}
    .mini-day{background:#fff}
    .mini-day.empty{background:#f8faf9}
    .mini-day.eventful{background:var(--green-soft);color:var(--green-dark);font-weight:800;cursor:pointer}

    .footer{margin-top:12px;text-align:center;color:var(--muted);font-size:.84rem;line-height:1.8;padding:4px 8px 0}

    .modal{
      position:fixed;inset:0;background:rgba(26,34,31,.35);display:none;align-items:flex-end;justify-content:center;padding:10px;z-index:1000;
    }
    .modal.show{display:flex}
    .modal-card{
      width:min(440px,100%);max-height:82vh;overflow:auto;padding:16px;border-radius:28px 28px 18px 18px;
      background:rgba(255,255,255,.97);animation:fadeIn .22s ease;
    }
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .modal-head h3{margin:0;color:var(--green-dark);font-size:1rem;font-weight:800}
    .close-btn{width:36px;height:36px;border-radius:50%;background:#f2f5f4;color:var(--text);padding:0;font-size:1.1rem;line-height:1}
    .empty-state{background:#fff;border:1px dashed var(--line);border-radius:16px;padding:16px;text-align:center;color:var(--muted);font-size:.88rem}

    #bottomNav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(440px,calc(100% - 16px));z-index:50}
    .bottom-nav-wrap{padding:6px;display:flex;gap:8px;box-shadow:0 10px 28px rgba(18,29,25,.12)}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px}
    .nav-btn small{font-size:.7rem}

    @media (min-width:700px){
      .container{width:min(920px,calc(100% - 18px))}
      .hero{display:grid;grid-template-columns:1.12fr .88fr;gap:14px}
      .toolbar{grid-template-columns:1fr 220px auto auto}
      .month-nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));overflow:visible}
      .calendar-grid{gap:8px}
      .weekday{font-size:.82rem;padding:8px}
      .day{min-height:88px;padding:8px}
      .day-number{width:30px;height:30px;font-size:.86rem}
      .day-text{font-size:.78rem;-webkit-line-clamp:2}
      .count{display:block;font-size:.72rem;color:var(--muted);font-weight:700}
      .layout{display:grid;grid-template-columns:1.08fr .62fr;gap:14px}
      .year-view{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      #bottomNav{width:min(720px,calc(100% - 24px))}
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="hero glass">
      <div class="top-row">
        <div>
          <div class="pills">
            <span class="pill">2025 / 2026</span>
            <span class="pill">1447 / 1448</span>
          </div>
          <h1>رزنامة الجنان</h1>
         
        </div>
         <img src="logo.png" alt="Logo" style="width:100%;height:100%;object-fit:contain;">
      </div>

      <div class="legend-box">
        <h2>دليل الألوان</h2>
        <div class="legend" id="legend"></div>
      </div>
    </header>

    <section class="toolbar glass">
      <input id="searchInput" class="field" type="text" placeholder="ابحث عن حدث أو مناسبة..." />
      <select id="categoryFilter" class="select">
        <option value="all">كل التصنيفات</option>
      </select>
      <div class="switch-wrap">
        <button class="switch-btn active" data-view="month">📅 شهري</button>
        <button class="switch-btn" data-view="year">🗓️ سنوي</button>
      </div>
      <div class="action-wrap">
        <button id="resetBtn" class="btn-soft">🏠 بداية</button>
        <button id="printBtn" class="btn-primary">🖨️ طباعة</button>
      </div>
    </section>

    <nav class="month-nav" id="monthNav"></nav>

    <section class="month-view active" id="monthView">
      <div class="layout">
        <div class="panel glass calendar-panel" id="calendarPanel">
          <p class="swipe-hint">اسحب يمينًا أو يسارًا للتنقل بين الأشهر</p>
          <div class="month-header">
            <div>
              <div class="season" id="seasonLabel"></div>
              <h2 class="month-title" id="monthTitle"></h2>
            </div>
            <div class="action-wrap">
              <button id="prevMonth" class="btn-soft">◀</button>
              <button id="nextMonth" class="btn-soft">▶</button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div>
          <div class="panel glass" id="eventsPanel">
            <div class="panel-head">
              <h3>الأحداث</h3>
              <p class="muted" id="eventsCount">0 حدث</p>
            </div>
            <div class="events" id="eventList"></div>
          </div>

          <div class="panel glass">
            <div class="panel-head">
              <h4>ملخص سريع</h4>
            </div>
            <div class="summary" id="summaryGrid"></div>
          </div>

          <div class="panel glass">
            <div class="panel-head">
              <h4>ملاحظات</h4>
            </div>
            <textarea id="notesArea" class="textarea" placeholder="اكتب ملاحظاتك هنا..."></textarea>
            <div class="action-wrap" style="margin-top:12px;">
              <button id="saveNotes" class="btn-primary">حفظ</button>
              <button id="clearNotes" class="btn-soft">مسح</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="year-view" id="yearView"></section>

    <div class="footer">جاهزة كملف index.html للنشر على GitHub Pages</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card glass">
      <div class="modal-head">
        <h3 id="modalTitle">تفاصيل اليوم</h3>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <nav id="bottomNav">
    <div class="bottom-nav-wrap glass">
      <button class="nav-btn active" data-target="month">
        <span>📅</span>
        <small>التقويم</small>
      </button>
      <button class="nav-btn" data-target="events">
        <span>🗂️</span>
        <small>الأحداث</small>
      </button>
      <button class="nav-btn" data-target="search">
        <span>🔍</span>
        <small>بحث</small>
      </button>
    </div>
  </nav>

  <script>
    const categoryMeta = {
      school:  { label: 'مواعيد تربوية', color: 'var(--school)' },
      holiday: { label: 'أعطال', color: 'var(--holiday)' },
      global:  { label: 'مناسبات عالمية', color: 'var(--global)' },
      islamic: { label: 'مناسبات إسلامية', color: 'var(--islamic)' },
      grades:  { label: 'تصدير علامات', color: 'var(--grades)' },
      review:  { label: 'مراجعة للاختبارات', color: 'var(--review)' },
      exam:    { label: 'امتحانات فصلية', color: 'var(--exam)' }
    };

    const weekDays = ['الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت','الأحد'];

    const months = [
      { key:'2025-09', title:'أيلول 2025', season:'بداية فصل الخريف', days:30, startOffset:0, events:[
        { day:5, title:'ذكرى المولد النبوي الشريف', category:'islamic' },
        { day:8, title:'دخول صفوف الثالث الثانوي', category:'school' },
        { day:10, title:'دخول صف التاسع', category:'school' },
        { day:15, title:'دخول المرحلة الثانوية', category:'school' },
        { day:17, title:'دخول المرحلة المتوسطة', category:'school' },
        { day:22, title:'دخول الحلقة الثانية', category:'school' },
        { day:24, title:'دخول الحلقة الأولى', category:'school' },
        { day:27, title:'اللقاء الأول لأولياء الأمور', category:'school' },
        { day:29, title:'دخول روضة ثانية وثالثة', category:'school' }
      ]},
      { key:'2025-10', title:'تشرين الأول 2025', season:'الخريف', days:31, startOffset:2, events:[
        { day:1, title:'دخول روضة أولى', category:'school' },
        { day:4, title:'يوم الرفق بالحيوان', category:'global' },
        { day:10, title:'اليوم العالمي للصحة النفسية', category:'global' },
        { day:11, title:'اللقاء الأول لأولياء الأمور في مرحلة الروضات', category:'school' }
      ]},
      { key:'2025-11', title:'تشرين الثاني 2025', season:'الخريف', days:30, startOffset:5, events:[
        { day:16, title:'يوم التسامح العالمي', category:'global' },
        { day:22, title:'ذكرى الاستقلال', category:'holiday' },
        { day:25, title:'نهاية السعي الأول (متوسط - ثانوي)', category:'school' },
        { day:29, title:'تصدير علامات السعي الأول', category:'grades' }
      ]},
      { key:'2025-12', title:'كانون الأول 2025', season:'الخريف', days:31, startOffset:0, events:[
        { day:4, title:'اليوم العالمي للغة العربية', category:'global' },
        { day:6, title:'عيد القديسة بربارة', category:'school' },
        { day:10, title:'اليوم العالمي لحقوق الإنسان', category:'global' },
        { day:13, title:'مراجعة للاختبارات', category:'review' },
        { day:15, title:'مراجعة للاختبارات', category:'review' },
        { day:16, title:'امتحانات فصلية', category:'exam' },
        { day:17, title:'امتحانات فصلية', category:'exam' },
        { day:22, title:'بدء عطلة الأعياد', category:'holiday' },

      ]},
      { key:'2026-05', title:'أيار 2026', season:'الربيع', days:31, startOffset:4, events:[
        { day:1, title:'عيد العمال', category:'holiday' },
        { day:3, title:'بدء فترة إنجاز العلامات', category:'grades' },

        { day:5, title:'بدء فترة إنجاز العلامات', category:'grades' },
        { day:18, title:'امتحان/فعالية مدرسية', category:'exam' },
        { day:21, title:'تصدير علامات', category:'grades' },
        { day:23, title:'تصدير علامات', category:'grades' },
        { day:27, title:'نشاطات التخرج', category:'islamic' },
        { day:28, title:'نشاطات التخرج', category:'islamic' },
        { day:29, title:'نشاطات التخرج', category:'islamic' },

      ]},
      { key:'2026-06', title:'حزيران 2026', season:'بداية فصل الصيف', days:30, startOffset:0, events:[
        { day:1, title:'مناسبة عالمية', category:'global' },
        { day:7, title:'مناسبة مدرسية', category:'school' },
        { day:13, title:'فعالية الصفوف العليا', category:'holiday' },
        { day:17, title:'حفل التخرج', category:'school' }
      ]}
    ];

    const state = { activeMonthIndex: 0, view: 'month' };
    const notesKey = 'jinan_calendar_notes_v3';

    const legend = document.getElementById('legend');
    const categoryFilter = document.getElementById('categoryFilter');
    const monthNav = document.getElementById('monthNav');
    const monthView = document.getElementById('monthView');
    const yearView = document.getElementById('yearView');
    const monthTitle = document.getElementById('monthTitle');
    const seasonLabel = document.getElementById('seasonLabel');
    const calendarGrid = document.getElementById('calendarGrid');
    const eventList = document.getElementById('eventList');
    const eventsCount = document.getElementById('eventsCount');
    const summaryGrid = document.getElementById('summaryGrid');
    const searchInput = document.getElementById('searchInput');
    const notesArea = document.getElementById('notesArea');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');
    const navBtns = document.querySelectorAll('.nav-btn');

    function softTap(el){
      if (!el) return;
      el.classList.remove('tap-pop');
      void el.offsetWidth;
      el.classList.add('tap-pop');
      if (navigator.vibrate) navigator.vibrate(8);
    }

    function populateLegendAndFilter() {
      Object.keys(categoryMeta).forEach(key => {
        const meta = categoryMeta[key];
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${meta.label}`;
        legend.appendChild(item);

        const option = document.createElement('option');
        option.value = key;
        option.textContent = meta.label;
        categoryFilter.appendChild(option);
      });
    }

    function matchesFilters(event) {
      const q = searchInput.value.trim().toLowerCase();
      const cat = categoryFilter.value;
      const text = `${event.title} ${categoryMeta[event.category].label}`.toLowerCase();
      const queryOk = !q || text.includes(q);
      const catOk = cat === 'all' || event.category === cat;
      return queryOk && catOk;
    }

    function buildMonthNav() {
      monthNav.innerHTML = '';
      months.forEach((month, index) => {
        const btn = document.createElement('button');
        btn.className = 'month-chip' + (index === state.activeMonthIndex ? ' active' : '');
        btn.textContent = month.title;
        btn.addEventListener('click', () => {
          state.activeMonthIndex = index;
          state.view = 'month';
          softTap(btn);
          render();
        });
        monthNav.appendChild(btn);
      });
    }

    function renderCalendar(month) {
      calendarGrid.innerHTML = '';
      monthTitle.textContent = month.title;
      seasonLabel.textContent = month.season;

      weekDays.forEach(name => {
        const head = document.createElement('div');
        head.className = 'weekday';
        head.textContent = name;
        calendarGrid.appendChild(head);
      });

      for (let i = 0; i < month.startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day empty';
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= month.days; day++) {
        const original = month.events.filter(e => e.day === day);
        const filtered = original.filter(matchesFilters);
        const cell = document.createElement('div');
        cell.className = 'day' + (original.length ? ' has-events' : '') + (original.length && !filtered.length ? ' dimmed' : '');

        const top = document.createElement('div');
        top.className = 'day-top';

        const number = document.createElement('div');
        number.className = 'day-number';
        number.textContent = day;
        if (filtered.length) {
          number.style.background = categoryMeta[filtered[0].category].color;
          number.style.color = '#fff';
        }

        const count = document.createElement('div');
        count.className = 'count';
        count.textContent = filtered.length ? (filtered.length + ' حدث') : (original.length ? 'مخفي' : '');

        top.appendChild(number);
        top.appendChild(count);
        cell.appendChild(top);

        if (filtered.length) {
          const text = document.createElement('div');
          text.className = 'day-text';
          text.textContent = filtered.map(e => e.title).join(' • ');
          cell.appendChild(text);

          const markers = document.createElement('div');
          markers.className = 'marker-row';
          [...new Set(filtered.map(e => e.category))].forEach(cat => {
            const marker = document.createElement('span');
            marker.className = 'marker';
            marker.style.background = categoryMeta[cat].color;
            markers.appendChild(marker);
          });
          cell.appendChild(markers);
        }

        if (original.length) {
          cell.addEventListener('click', () => {
            softTap(cell);
            openModal(month.title, day, filtered.length ? filtered : original, !filtered.length);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    function renderEvents(month) {
      const items = month.events.filter(matchesFilters).sort((a, b) => a.day - b.day);
      eventList.innerHTML = '';
      eventsCount.textContent = items.length + ' حدث';

      if (!items.length) {
        eventList.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة في هذا الشهر.</div>';
        return;
      }

      items.forEach(event => {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = `<div class="event-top"><span class="tag"><span class="dot" style="background:${meta.color}"></span>${meta.label}</span><span>${event.day} ${month.title.split(' ')[0]}</span></div><p class="event-title">${event.title}</p>`;
        card.addEventListener('click', () => {
          softTap(card);
          const sameDay = month.events.filter(e => e.day === event.day && matchesFilters(e));
          openModal(month.title, event.day, sameDay, false);
        });
        eventList.appendChild(card);
      });
    }

    function renderSummary(month) {
      const counts = { school:0, holiday:0, global:0, islamic:0, grades:0, review:0, exam:0 };
      month.events.filter(matchesFilters).forEach(e => { counts[e.category]++; });
      summaryGrid.innerHTML = '';
      Object.keys(categoryMeta).forEach(key => {
        const box = document.createElement('div');
        box.className = 'summary-box';
        box.innerHTML = `<strong>${counts[key]}</strong><span>${categoryMeta[key].label}</span>`;
        summaryGrid.appendChild(box);
      });
    }

    function renderYear() {
      yearView.innerHTML = '';
      months.forEach((month, index) => {
        const card = document.createElement('div');
        card.className = 'mini-month glass';
        card.innerHTML = `<h3>${month.title}</h3>`;
        const grid = document.createElement('div');
        grid.className = 'mini-grid';

        weekDays.forEach(day => {
          const head = document.createElement('div');
          head.className = 'mini-head';
          head.textContent = day.slice(0,2);
          grid.appendChild(head);
        });

        for (let i = 0; i < month.startOffset; i++) {
          const empty = document.createElement('div');
          empty.className = 'mini-day empty';
          grid.appendChild(empty);
        }

        for (let d = 1; d <= month.days; d++) {
          const visible = month.events.some(e => e.day === d && matchesFilters(e));
          const el = document.createElement('div');
          el.className = 'mini-day' + (visible ? ' eventful' : '');
          el.textContent = d;
          if (visible) {
            el.addEventListener('click', () => {
              state.activeMonthIndex = index;
              state.view = 'month';
              softTap(el);
              render();
            });
          }
          grid.appendChild(el);
        }

        card.appendChild(grid);
        yearView.appendChild(card);
      });
    }

    function openModal(monthTitleText, day, events, filteredOut) {
      modalTitle.textContent = day + ' ' + monthTitleText;
      modalContent.innerHTML = '';
      if (filteredOut) {
        const note = document.createElement('div');
        note.className = 'empty-state';
        note.textContent = 'هذا اليوم فيه أحداث لكنها غير ظاهرة بسبب الفلترة الحالية.';
        modalContent.appendChild(note);
      }
      events.forEach(event => {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = `<div class="event-top"><span class="tag"><span class="dot" style="background:${meta.color}"></span>${meta.label}</span><span>${day}</span></div><p class="event-title">${event.title}</p>`;
        modalContent.appendChild(card);
      });
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function updateView() {
      document.querySelectorAll('.switch-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === state.view);
      });
      monthView.classList.toggle('active', state.view === 'month');
      yearView.classList.toggle('active', state.view === 'year');
    }

    function render() {
      buildMonthNav();
      const month = months[state.activeMonthIndex];
      renderCalendar(month);
      renderEvents(month);
      renderSummary(month);
      renderYear();
      updateView();

      const panel = document.getElementById('calendarPanel');
      panel.classList.remove('month-animate');
      void panel.offsetWidth;
      panel.classList.add('month-animate');
    }

    document.querySelectorAll('.switch-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.view = btn.dataset.view;
        softTap(btn);
        updateView();
      });
    });

    document.getElementById('prevMonth').addEventListener('click', () => {
      state.activeMonthIndex = (state.activeMonthIndex - 1 + months.length) % months.length;
      softTap(document.getElementById('prevMonth'));
      render();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      state.activeMonthIndex = (state.activeMonthIndex + 1) % months.length;
      softTap(document.getElementById('nextMonth'));
      render();
    });

    document.getElementById('printBtn').addEventListener('click', () => { softTap(document.getElementById('printBtn')); window.print(); });
    document.getElementById('resetBtn').addEventListener('click', () => {
      state.activeMonthIndex = 0;
      state.view = 'month';
      softTap(document.getElementById('resetBtn'));
      render();
    });

    searchInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);

    document.getElementById('saveNotes').addEventListener('click', () => {
      localStorage.setItem(notesKey, notesArea.value);
      softTap(document.getElementById('saveNotes'));
      alert('تم حفظ الملاحظات.');
    });

    document.getElementById('clearNotes').addEventListener('click', () => {
      notesArea.value = '';
      localStorage.removeItem(notesKey);
      softTap(document.getElementById('clearNotes'));
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        navBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        softTap(btn);
        const target = btn.dataset.target;
        if (target === 'month') document.getElementById('monthView').scrollIntoView({behavior:'smooth'});
        if (target === 'events') document.getElementById('eventsPanel').scrollIntoView({behavior:'smooth'});
        if (target === 'search') {
          window.scrollTo({top:0,behavior:'smooth'});
          setTimeout(() => searchInput.focus(), 220);
        }
      });
    });

    (function(){
      const panel = document.getElementById('calendarPanel');
      let startX = 0, startY = 0, touching = false;
      panel.addEventListener('touchstart', e => {
        const t = e.changedTouches[0];
        startX = t.clientX; startY = t.clientY; touching = true;
      }, {passive:true});
      panel.addEventListener('touchend', e => {
        if (!touching) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        touching = false;
        if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) document.getElementById('nextMonth').click();
          else document.getElementById('prevMonth').click();
        }
      }, {passive:true});
    })();

    notesArea.value = localStorage.getItem(notesKey) || '';
    populateLegendAndFilter();
    render();
  </script>
