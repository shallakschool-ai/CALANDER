    function buildLegendAndFilter() {
      Object.keys(categoryMeta).forEach(function(key) {
        const meta = categoryMeta[key];
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<span class="dot" style="background:' + meta.color + '"></span>' + meta.label;
        legend.appendChild(item);

        const option = document.createElement('option');
        option.value = key;
        option.textContent = meta.label;
        categoryFilter.appendChild(option);
      });
    }

    function matchesFilters(event) {
      const q = searchInput.value.trim().toLowerCase();
      const cat = categoryFilter.value;
      const text = (event.title + ' ' + categoryMeta[event.category].label).toLowerCase();
      const queryOk = !q || text.indexOf(q) !== -1;
      const catOk = cat === 'all' || event.category === cat;
      return queryOk && catOk;
    }

    function buildMonthNav() {
      monthNav.innerHTML = '';
      months.forEach(function(month, index) {
        const btn = document.createElement('button');
        btn.className = 'month-chip' + (index === state.activeMonthIndex ? ' active' : '');
        btn.textContent = month.title;
        btn.addEventListener('click', function() {
          state.activeMonthIndex = index;
          state.view = 'month';
          render();
        });
        monthNav.appendChild(btn);
      });
    }

        const empty = document.createElement('div');
        empty.className = 'day empty';
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= month.days; day++) {
        const original = month.events.filter(function(e) { return e.day === day; });
        const filtered = original.filter(matchesFilters);
        const cell = document.createElement('div');
        cell.className = 'day' + (original.length ? ' has-events' : '') + (original.length && !filtered.length ? ' dimmed' : '');

        const top = document.createElement('div');
        top.className = 'day-top';

        const number = document.createElement('div');
        number.className = 'day-number';
        number.textContent = day;
        if (filtered.length) {
          number.style.background = categoryMeta[filtered[0].category].color;
          number.style.color = '#fff';
        }

        const count = document.createElement('div');
        count.className = 'count';
        count.textContent = filtered.length ? (filtered.length + ' حدث') : (original.length ? 'مخفي' : '');

        top.appendChild(number);
        top.appendChild(count);
        cell.appendChild(top);

        if (filtered.length) {
          const text = document.createElement('div');
          text.className = 'day-text';
          text.textContent = filtered.map(function(e) { return e.title; }).join(' • ');
          cell.appendChild(text);

          const markers = document.createElement('div');
          markers.className = 'marker-row';
          Array.from(new Set(filtered.map(function(e) { return e.category; }))).forEach(function(cat) {
            const marker = document.createElement('span');
            marker.className = 'marker';
            marker.style.background = categoryMeta[cat].color;
            markers.appendChild(marker);
          });
          cell.appendChild(markers);
        }

        if (original.length) {
          cell.addEventListener('click', function() {
            openModal(month.title, day, filtered.length ? filtered : original, !filtered.length);
          });
        }

        calendarGrid.appendChild(cell);
      }
    }

    function renderEvents(month) {
      const items = month.events.filter(matchesFilters).sort(function(a, b) { return a.day - b.day; });
      eventList.innerHTML = '';
      eventsCount.textContent = items.length + ' حدث';

      if (!items.length) {
        eventList.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة في هذا الشهر.</div>';
        return;
      }

      items.forEach(function(event) {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = '<div class="event-top"><span class="tag"><span class="dot" style="background:' + meta.color + '"></span>' + meta.label + '</span><span>' + event.day + ' ' + month.title.split(' ')[0] + '</span></div><p class="event-title">' + event.title + '</p>';
        card.addEventListener('click', function() {
          const sameDay = month.events.filter(function(e) { return e.day === event.day && matchesFilters(e); });
          openModal(month.title, event.day, sameDay, false);
        });
        eventList.appendChild(card);
      });
    }

    function renderSummary(month) {
      const counts = { school:0, holiday:0, global:0, islamic:0, grades:0, review:0, exam:0 };
      month.events.filter(matchesFilters).forEach(function(e) { counts[e.category]++; });
      summaryGrid.innerHTML = '';
      Object.keys(categoryMeta).forEach(function(key) {
        const box = document.createElement('div');
        box.className = 'summary-box';
        box.innerHTML = '<strong>' + counts[key] + '</strong><span>' + categoryMeta[key].label + '</span>';
        summaryGrid.appendChild(box);
      });
    }

    function renderYear() {
      yearView.innerHTML = '';
      months.forEach(function(month, index) {
        const card = document.createElement('div');
        card.className = 'mini-month';
        card.innerHTML = '<h3>' + month.title + '</h3>';
        const grid = document.createElement('div');
        grid.className = 'mini-grid';

        weekDays.forEach(function(day) {
          const head = document.createElement('div');
          head.className = 'mini-head';
          head.textContent = day.slice(0,2);
          grid.appendChild(head);
        });

        for (let i = 0; i < month.startOffset; i++) {
          const empty = document.createElement('div');
          empty.className = 'mini-day empty';
          grid.appendChild(empty);
        }

        for (let d = 1; d <= month.days; d++) {
          const visible = month.events.some(function(e) { return e.day === d && matchesFilters(e); });
          const el = document.createElement('div');
          el.className = 'mini-day' + (visible ? ' eventful' : '');
          el.textContent = d;
          if (visible) {
            el.addEventListener('click', function() {
              state.activeMonthIndex = index;
              state.view = 'month';
              render();
            });
          }
          grid.appendChild(el);
        }

        card.appendChild(grid);
        yearView.appendChild(card);
      });
    }

    function openModal(monthTitleText, day, events, filteredOut) {
      modalTitle.textContent = day + ' ' + monthTitleText;
      modalContent.innerHTML = '';
      if (filteredOut) {
        const note = document.createElement('div');
        note.className = 'empty-state';
        note.textContent = 'هذا اليوم فيه أحداث لكنها غير ظاهرة بسبب الفلترة الحالية.';
        modalContent.appendChild(note);
      }
      events.forEach(function(event) {
        const meta = categoryMeta[event.category];
        const card = document.createElement('div');
        card.className = 'event-card';
        card.innerHTML = '<div class="event-top"><span class="tag"><span class="dot" style="background:' + meta.color + '"></span>' + meta.label + '</span><span>' + day + '</span></div><p class="event-title">' + event.title + '</p>';
        modalContent.appendChild(card);
      });
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function updateView() {
      document.querySelectorAll('.switch-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.view === state.view);
      });
      monthView.classList.toggle('active', state.view === 'month');
      yearView.classList.toggle('active', state.view === 'year');
    }

    function render() {
      buildMonthNav();
      const month = months[state.activeMonthIndex];
      renderCalendar(month);
      renderEvents(month);
      renderSummary(month);
      renderYear();
      updateView();
    }

    document.querySelectorAll('.switch-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.view = btn.dataset.view;
        updateView();
      });
    });

    document.getElementById('prevMonth').addEventListener('click', function() {
      state.activeMonthIndex = (state.activeMonthIndex - 1 + months.length) % months.length;
      render();
    });

    document.getElementById('nextMonth').addEventListener('click', function() {
      state.activeMonthIndex = (state.activeMonthIndex + 1) % months.length;
      render();
    });

    document.getElementById('printBtn').addEventListener('click', function() { window.print(); });
    document.getElementById('resetBtn').addEventListener('click', function() {
      state.activeMonthIndex = 0;
      state.view = 'month';
      render();
    });

    searchInput.addEventListener('input', render);
    categoryFilter.addEventListener('change', render);

    document.getElementById('saveNotes').addEventListener('click', function() {
      localStorage.setItem(notesKey, notesArea.value);
      alert('تم حفظ الملاحظات.');
    });

    document.getElementById('clearNotes').addEventListener('click', function() {
      notesArea.value = '';
      localStorage.removeItem(notesKey);
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    notesArea.value = localStorage.getItem(notesKey) || '';
    buildLegendAndFilter();
    render();
  </script>
</body>
</html>
